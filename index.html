<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Solitario 2048 - Modo Claro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col items-center py-10 font-sans">
    
    <header class="mb-10 text-center">
        <h1 class="text-4xl font-extrabold text-slate-800 mb-2">Solitario 2048</h1>
        <div class="text-xl font-bold bg-white px-6 py-2 rounded-full border border-slate-200 shadow-sm">
            Puntos: <span id="score" class="text-blue-600">0</span>
        </div>
    </header>

    <div class="flex flex-row items-start gap-12 w-full max-w-4xl px-4">
        
        <div class="flex flex-col items-center gap-4 bg-white p-6 rounded-2xl border border-slate-200 shadow-lg">
            <span class="text-xs uppercase tracking-widest text-slate-500 font-bold">Mazo</span>
            <div id="next-card-display" class="w-24 h-36 bg-slate-100 rounded-xl flex items-center justify-center border border-slate-200"></div>
        </div>

        <div class="flex gap-8 w-full h-[500px] bg-white p-6 rounded-2xl border border-slate-200 shadow-inner">
            <div id="col-0" class="flex-1 flex flex-col-reverse items-center gap-3 cursor-pointer group" onclick="dropCard(0)">
                <div class="text-slate-300 group-hover:text-blue-500 transition-colors animate-bounce">▲</div>
                <div class="w-full h-full flex flex-col-reverse gap-2"></div>
            </div>
            <div id="col-1" class="flex-1 flex flex-col-reverse items-center gap-3 cursor-pointer group" onclick="dropCard(1)">
                <div class="text-slate-300 group-hover:text-blue-500 transition-colors animate-bounce">▲</div>
                <div class="w-full h-full flex flex-col-reverse gap-2"></div>
            </div>
            <div id="col-2" class="flex-1 flex flex-col-reverse items-center gap-3 cursor-pointer group" onclick="dropCard(2)">
                <div class="text-slate-300 group-hover:text-blue-500 transition-colors animate-bounce">▲</div>
                <div class="w-full h-full flex flex-col-reverse gap-2"></div>
            </div>
            <div id="col-3" class="flex-1 flex flex-col-reverse items-center gap-3 cursor-pointer group" onclick="dropCard(3)">
                <div class="text-slate-300 group-hover:text-blue-500 transition-colors animate-bounce">▲</div>
                <div class="w-full h-full flex flex-col-reverse gap-2"></div>
            </div>
        </div>
    </div>

    <button onclick="location.reload()" class="mt-10 bg-slate-800 text-white hover:bg-slate-900 px-8 py-3 rounded-xl font-bold transition-all shadow-md">
        Reiniciar Juego
    </button>

    <script src="script.js"></script>
</body>
</html>
