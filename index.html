<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solitario 2048</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="contenedor-juego">
        <header>
            <h1>Solitario 2048</h1>
            <div class="marcador">
                <p>Puntuación: <span id="puntuacion">0</span></p>
                <button id="btn-reiniciar">Reiniciar Juego</button>
            </div>
        </header>

        <div class="seccion-principal">
            <div class="area-controles">
                <div class="contenedor-mazo">
                    <h3>Mazo:</h3>
                    <div id="mazo" class="mazo"></div>
                </div>
                
                <div class="contenedor-descartes">
                    <h3>Descartes:</h3>
                    <div class="descartes">
                        <img src="cartas/cartaDescarte0.png" class="btn-descarte" alt="Descarte 1">
                        <img src="cartas/cartaDescarte0.png" class="btn-descarte" alt="Descarte 2">
                    </div>
                </div>
            </div>

            <div class="tablero" id="tablero">
                <div class="columna" data-columna="0"></div>
                <div class="columna" data-columna="1"></div>
                <div class="columna" data-columna="2"></div>
                <div class="columna" data-columna="3"></div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
